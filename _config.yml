# Pages shown in navbar (simplified - fix these later)
nav_pages:
  - name: about
  - name: publications
  - name: projects
  - name: team
  - name: tutorials
  - name: collaborators
  - name: funding

include:
  - _pages

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

# Plugins (simplified for GitHub Pages compatibility)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Basic scholar configuration (commented out for now)
# scholar:
#   style: apa
#   locale: en
#   bibliography: references.bib

# Exclude unnecessary files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
